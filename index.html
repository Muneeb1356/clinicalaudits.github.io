<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Audits | Elevate Your Standards</title>
    <!-- Tailwind CSS (Loads styling automatically without needing a separate file) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for typography that matches your design -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center">

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto px-6 py-16 lg:px-8 flex flex-col lg:flex-row items-center gap-16">
        
        <!-- Left Side: Text and Buttons -->
        <div class="lg:w-1/2 flex flex-col items-start text-left">
            
            <!-- Trust Badge -->
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-50 text-blue-600 text-sm font-semibold mb-8 border border-blue-100">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                </svg>
                Trusted by 500+ Healthcare Providers
            </div>

            <!-- Main Headline -->
            <h1 class="text-5xl lg:text-6xl font-extrabold text-slate-900 leading-tight tracking-tight mb-6">
                Elevate Your <br />
                <span class="text-[#0284c7]">Clinical Standards</span>
            </h1>

            <!-- Subtitle / Paragraph -->
            <p class="text-lg text-slate-600 mb-10 leading-relaxed max-w-lg">
                Streamline clinical audits, ensure rigorous regulatory compliance, and drive better patient outcomes with our intelligent, interactive auditing platform.
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto">
                <a href="#" class="inline-flex justify-center items-center px-8 py-3.5 text-base font-semibold text-white bg-[#0284c7] hover:bg-[#0369a1] rounded-full transition-all duration-200 shadow-lg shadow-blue-500/30">
                    Get Started Now
                </a>
                <a href="#" class="inline-flex justify-center items-center px-8 py-3.5 text-base font-semibold text-slate-700 bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 rounded-full transition-all duration-200">
                    Learn More
                </a>
            </div>
            
        </div>

        <!-- Right Side: SVG Graphic (Fixes the broken image issue completely) -->
        <div class="lg:w-1/2 w-full mt-12 lg:mt-0 relative group">
            <!-- Decorative blur behind the graphic -->
            <div class="absolute -inset-4 bg-gradient-to-r from-blue-100 to-teal-50 opacity-70 blur-2xl rounded-full group-hover:opacity-100 transition duration-1000"></div>
            
            <!-- Custom Medical Data SVG Graphic -->
            <div class="relative bg-white border border-slate-100 rounded-3xl p-6 shadow-2xl shadow-slate-200/50">
                <svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg" class="w-full h-auto rounded-xl">
                    <!-- Background Grid -->
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="1.5"/>
                    </pattern>
                    <rect width="100%" height="100%" fill="url(#grid)" />
                    
                    <!-- X and Y Axis -->
                    <line x1="50" y1="300" x2="450" y2="300" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
                    <line x1="50" y1="50" x2="50" y2="300" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>

                    <!-- Data Bars with Gradient -->
                    <defs>
                        <linearGradient id="bar-gradient" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#38bdf8" />
                            <stop offset="100%" stop-color="#0284c7" />
                        </linearGradient>
                    </defs>

                    <rect x="80" y="200" width="45" height="100" rx="6" fill="#bae6fd" />
                    <rect x="160" y="140" width="45" height="160" rx="6" fill="#7dd3fc" />
                    <rect x="240" y="220" width="45" height="80" rx="6" fill="#bae6fd" />
                    <rect x="320" y="80" width="45" height="220" rx="6" fill="url(#bar-gradient)" />
                    <rect x="400" y="160" width="45" height="140" rx="6" fill="#7dd3fc" />

                    <!-- Medical Cross Badge (Top Right) -->
                    <g transform="translate(420, 20)">
                        <circle cx="30" cy="30" r="24" fill="#ffffff" filter="drop-shadow(0 4px 6px rgb(0 0 0 / 0.1))" />
                        <rect x="26" y="16" width="8" height="28" fill="#0284c7" rx="2" />
                        <rect x="16" y="26" width="28" height="8" fill="#0284c7" rx="2" />
                    </g>

                    <!-- Trend Line -->
                    <path d="M 100 180 L 180 120 L 260 200 L 340 50 L 420 140" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                    
                    <!-- Data Points on Trend Line -->
                    <circle cx="100" cy="180" r="6" fill="#ffffff" stroke="#f59e0b" stroke-width="3" />
                    <circle cx="180" cy="120" r="6" fill="#ffffff" stroke="#f59e0b" stroke-width="3" />
                    <circle cx="260" cy="200" r="6" fill="#ffffff" stroke="#f59e0b" stroke-width="3" />
                    <circle cx="340" cy="50" r="8" fill="#ffffff" stroke="#0284c7" stroke-width="4" />
                    <circle cx="420" cy="140" r="6" fill="#ffffff" stroke="#f59e0b" stroke-width="3" />
                </svg>
            </div>
        </div>
        
    </div>

</body>
</html>
